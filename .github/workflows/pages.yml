name: Publish static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (copy outputs/ data into webapp/)
        run: |
          cp outputs/catalog.json webapp/catalog.json
          cp -r outputs/questionnaires webapp/questionnaires
          cp -r outputs/notes webapp/notes
          cp README.md webapp/README.md
      - name: Upload site artifact (webapp/ only)
        uses: actions/upload-pages-artifact@v3
        with:
          path: webapp

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
